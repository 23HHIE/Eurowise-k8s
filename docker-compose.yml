services:
  mysql:
    image: mysql:8.0
    container_name: eurowise-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: eurowise
      MYSQL_USER: eurowise
      MYSQL_PASSWORD: eurowise123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./Backend/Eurowise-rest-api-code
      dockerfile: Dockerfile.multistage
    container_name: eurowise-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/eurowise
      SPRING_DATASOURCE_USERNAME: eurowise
      SPRING_DATASOURCE_PASSWORD: eurowise123
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./Frontend/Expends/expenditure-app
      dockerfile: Dockerfile
    container_name: eurowise-frontend
    ports:
      - "3001:80"
    depends_on:
      - backend

volumes:
  mysql_data:
